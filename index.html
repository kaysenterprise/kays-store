<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kays Enterprise - Quality products at great prices. Order now with fast delivery.">
  <meta name="theme-color" content="#4f46e5">
  <title>Kays Enterprise | Premium Products Store</title>
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>📦 Kays Enterprise Store</h1>
      <p>Discover our premium products. Click "Order Now" to get started with your purchase.</p>
    </header>

    <!-- Product Grid -->
    <div id="product-grid" class="product-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading amazing products...</div>
      </div>
    </div>

    <!-- Order Section -->
    <section class="order-section">
      <h2>Complete Your Order</h2>
      <div class="form-container">
        <iframe id="order-form" title="Order Form" loading="lazy"></iframe>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>🔒 Secure checkout • <strong>Kays Enterprise</strong> • © 2026 All rights reserved</p>
    </footer>
  </div>

  <!-- External JavaScript -->
  <script src="script.js"></script>
</body>
</html>
